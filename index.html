<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoE X Analyzer — Proof of Energy</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f8f9fa; color: #1a1a2e; min-height: 100vh; }
.header { background: #1a1a2e; color: white; padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; }
.header-left h1 { font-size: 22px; font-weight: 600; }
.header-left p { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 4px; }
.lang-toggle { display: flex; gap: 0; border: 0.5px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: hidden; }
.lang-btn { padding: 7px 16px; font-size: 12px; cursor: pointer; color: rgba(255,255,255,0.6); background: transparent; border: none; transition: all 0.15s; }
.lang-btn.active { background: rgba(255,255,255,0.15); color: white; font-weight: 500; }
.context-banner { background: white; border-left: 3px solid #378ADD; border-radius: 0 10px 10px 0; padding: 14px 18px; margin: 20px 0; font-size: 13px; color: #444; line-height: 1.7; }
.context-banner strong { color: #1a1a2e; }
.container { max-width: 920px; margin: 0 auto; padding: 24px 20px; }
.upload-zone { border: 1.5px dashed #ccc; border-radius: 12px; padding: 40px; text-align: center; background: white; margin-bottom: 24px; transition: border-color 0.2s; }
.upload-zone:hover { border-color: #378ADD; }
.upload-zone.active { border-color: #1D9E75; background: #f0fdf4; }
.upload-zone input { display: none; }
.upload-btn { display: inline-block; margin-top: 16px; padding: 10px 24px; background: #1a1a2e; color: white; border-radius: 8px; font-size: 13px; cursor: pointer; }
.upload-btn-sm { display: inline-block; padding: 8px 18px; background: transparent; color: #1a1a2e; border: 0.5px solid #ccc; border-radius: 8px; font-size: 12px; cursor: pointer; margin-bottom: 20px; }
.tabs { display: flex; border-bottom: 0.5px solid #e5e7eb; margin-bottom: 24px; }
.tab { padding: 10px 20px; font-size: 13px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; white-space: nowrap; }
.tab.active { color: #1a1a2e; border-bottom-color: #1a1a2e; font-weight: 500; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.metric { background: white; border-radius: 10px; padding: 16px; border: 0.5px solid #e5e7eb; }
.metric-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.metric-value { font-size: 24px; font-weight: 600; color: #1a1a2e; }
.metric-sub { font-size: 11px; color: #aaa; margin-top: 4px; }
.card { background: white; border-radius: 12px; padding: 20px; border: 0.5px solid #e5e7eb; margin-bottom: 20px; }
.card-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
.chart-wrap { position: relative; width: 100%; }
.insight { background: #f0fdf4; border-left: 3px solid #1D9E75; border-radius: 0 8px 8px 0; padding: 12px 16px; margin-top: 14px; font-size: 13px; color: #0F6E56; line-height: 1.6; }
.insight.amber { background: #fefce8; border-color: #BA7517; color: #854F0B; }
.insight.blue { background: #e8f4ff; border-color: #378ADD; color: #185FA5; }
.spike-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid #f0f0f0; }
.spike-row:last-child { border-bottom: none; }
.spike-date { font-size: 12px; color: #888; min-width: 100px; }
.spike-bar-bg { flex: 1; background: #f0f0f0; border-radius: 4px; height: 8px; overflow: hidden; }
.spike-bar-fill { height: 8px; border-radius: 4px; }
.spike-num { font-size: 13px; font-weight: 500; min-width: 64px; text-align: right; }
.spike-eff { font-size: 12px; min-width: 60px; text-align: right; }
.legend { display: flex; gap: 20px; font-size: 12px; color: #888; margin-bottom: 10px; flex-wrap: wrap; }
.legend span { display: flex; align-items: center; gap: 5px; }
.dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
.dark-card { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.dark-card .card-title { color: rgba(255,255,255,0.4); }
.dark-card p { font-size: 14px; color: rgba(255,255,255,0.82); line-height: 1.8; }
.gst { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 0.5px solid #e5e7eb; }
.mrow { display: grid; grid-template-columns: 160px 1fr 1fr; border: 0.5px solid #e5e7eb; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.mrow > div { padding: 13px 15px; font-size: 13px; line-height: 1.6; }
.mn { background: #f8f9fa; font-weight: 500; border-right: 0.5px solid #e5e7eb; }
.mn .tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 4px; margin-top: 5px; font-weight: 400; }
.mm { color: #666; border-right: 0.5px solid #e5e7eb; }
.ma { color: #444; }
.pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.pc { border-radius: 10px; padding: 16px; }
.alist { border: 0.5px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
.aitem { padding: 14px 18px; border-bottom: 0.5px solid #f0f0f0; display: flex; gap: 12px; }
.aitem:last-child { border-bottom: none; }
.anum { font-size: 13px; font-weight: 600; color: #1D9E75; min-width: 20px; }
.ustep { display: flex; gap: 14px; padding: 12px 0; border-bottom: 0.5px solid #f5f5f5; align-items: flex-start; }
.ustep:last-child { border-bottom: none; }
.snum { width: 24px; height: 24px; background: #1a1a2e; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.error-box { background: #fff5f5; border: 0.5px solid #F09595; border-radius: 10px; padding: 16px 20px; font-size: 13px; color: #A32D2D; line-height: 1.7; margin-bottom: 16px; }
.footer { text-align: center; padding: 32px; font-size: 12px; color: #bbb; }
@media(max-width:640px){ .metrics{grid-template-columns:repeat(2,1fr);} .mrow{grid-template-columns:1fr;} .mm,.mn{border-right:none;border-bottom:0.5px solid #e5e7eb;} .pgrid{grid-template-columns:1fr;} .tabs{overflow-x:auto;} }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>PoE X Analyzer</h1>
    <p class="t" data-ko="Proof of Energy — X 계정 에너지 흐름 분석" data-en="Proof of Energy — X Account Energy Flow Analysis"></p>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
  </div>
</div>

<div class="container">
  <div class="context-banner">
    <span class="t"
      data-ko="<strong>X 알고리즘은 플랫폼의 방향을 최적화합니다.</strong> 이 분석은 당신 콘텐츠의 실제 에너지 흐름을 보여줍니다.<br>둘은 다를 수 있습니다. 이 도구는 답을 주지 않습니다. <strong>현재 당신의 위치를 보여줄 뿐입니다.</strong>"
      data-en="<strong>X's algorithm optimizes for the platform's goals.</strong> This analysis shows the actual energy flow of your content.<br>The two may point in different directions. This tool does not give answers. <strong>It only shows where you currently stand.</strong>">
    </span>
  </div>

  <div class="upload-zone" id="uploadZone">
    <h3 class="t" style="font-size:15px;color:#444;margin-bottom:8px;"
      data-ko="X 분석 데이터를 업로드하세요"
      data-en="Upload your X Analytics data"></h3>
    <p class="t" style="font-size:13px;color:#999;margin-bottom:6px;"
      data-ko="① account_overview_analytics.csv — 일별 에너지 흐름 분석"
      data-en="① account_overview_analytics.csv — daily energy flow analysis"></p>
    <p class="t" style="font-size:13px;color:#999;"
      data-ko="② account_analytics_content_*.csv — 포스트별 콘텐츠 분석 (두 파일 동시 선택 시 통합 분석)"
      data-en="② account_analytics_content_*.csv — per-post content analysis (select both for integrated analysis)"></p>
    <label class="upload-btn" style="margin-top:14px;">
      <span class="t" data-ko="파일 선택 (여러 개 가능)" data-en="Choose files (multiple OK)"></span>
      <input type="file" id="fileInput" accept=".csv" multiple>
    </label>
    <p class="t" style="margin-top:12px;font-size:12px;color:#ccc;"
      data-ko="또는 파일을 여기로 드래그하세요"
      data-en="Or drag and drop your files here"></p>
  </div>

  <div id="results" style="display:none;">
    <label class="upload-btn-sm">
      <span class="t" data-ko="다른 파일 분석" data-en="Analyze another file"></span>
      <input type="file" id="fileInput2" accept=".csv" style="display:none;">
    </label>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('analysis')"><span class="t" data-ko="분석 결과" data-en="Analysis"></span></div>
      <div class="tab" onclick="switchTab('heatmap')"><span class="t" data-ko="요일 히트맵" data-en="Day Heatmap"></span></div>
      <div class="tab" id="tab-content-btn" onclick="switchTab('content')" style="display:none;"><span class="t" data-ko="콘텐츠 분석" data-en="Content Analysis"></span></div>
      <div class="tab" onclick="switchTab('guide')"><span class="t" data-ko="PoE 해석 가이드" data-en="PoE Guide"></span></div>
      <div class="tab" onclick="switchTab('update')"><span class="t" data-ko="데이터 업데이트 방법" data-en="How to Update"></span></div>
    </div>

    <!-- 분석 결과 탭 -->
    <div class="tab-content active" id="tab-analysis">
      <div id="error-area"></div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label t" data-ko="총 노출 에너지" data-en="Total Impressions"></div>
          <div class="metric-value" id="m-total">—</div>
          <div class="metric-sub t" data-ko="전체 기간 누적" data-en="Cumulative total"></div>
        </div>
        <div class="metric">
          <div class="metric-label t" data-ko="에너지 전환율" data-en="Energy Conversion Rate"></div>
          <div class="metric-value" id="m-conv">—</div>
          <div class="metric-sub t" data-ko="참여 / 노출" data-en="Engagements / Impressions"></div>
        </div>
        <div class="metric">
          <div class="metric-label t" data-ko="팔로워 전환율" data-en="Follower Conversion Rate"></div>
          <div class="metric-value" id="m-follow">—</div>
          <div class="metric-sub t" data-ko="새 팔로우 / 노출 1만" data-en="New follows per 10K imp."></div>
        </div>
        <div class="metric">
          <div class="metric-label t" data-ko="고에너지 급등일" data-en="High-Energy Spike Days"></div>
          <div class="metric-value" id="m-spikes">—</div>
          <div class="metric-sub t" data-ko="평균 3배 이상" data-en="3× above average"></div>
        </div>
      </div>

      <div class="insight blue" id="insight-follow" style="margin-bottom:16px;display:none;"></div>

      <div class="card">
        <div class="card-title t" data-ko="일별 에너지 흐름" data-en="Daily Energy Flow"></div>
        <div class="legend">
          <span><span class="dot" style="background:#1D9E75"></span><span class="t" data-ko="고에너지 급등" data-en="High-energy spike"></span></span>
          <span><span class="dot" style="background:#378ADD"></span><span class="t" data-ko="일반 에너지" data-en="Normal energy"></span></span>
        </div>
        <div class="chart-wrap" style="height:220px"><canvas id="mainChart"></canvas></div>
        <div class="insight" id="insight-main"></div>
      </div>

      <div class="card">
        <div class="card-title t" data-ko="에너지 전환 효율 — PoE 핵심 지표" data-en="Energy Conversion Efficiency — Core PoE Metric"></div>
        <p class="t" style="font-size:12px;color:#aaa;margin-bottom:12px;"
          data-ko="노출 대비 실제 참여 비율. 높을수록 에너지가 자발적으로 모이는 콘텐츠."
          data-en="Engagement rate relative to impressions. Higher = content that naturally attracts energy."></p>
        <div class="chart-wrap" style="height:200px"><canvas id="effChart"></canvas></div>
        <div class="insight amber" id="insight-eff"></div>
      </div>

      <div class="card">
        <div class="card-title t" data-ko="고에너지 급등일 상세" data-en="High-Energy Spike Days Detail"></div>
        <p style="font-size:12px;color:#aaa;margin-bottom:14px;">
          <span style="color:#1D9E75;font-weight:500" class="t" data-ko="초록" data-en="Green"></span>
          <span class="t" data-ko=" = 전환율 평균 이상 &nbsp;|&nbsp; " data-en=" = above avg. conversion &nbsp;|&nbsp; "></span>
          <span style="color:#378ADD;font-weight:500" class="t" data-ko="파랑" data-en="Blue"></span>
          <span class="t" data-ko=" = 전환율 평균 이하" data-en=" = below avg. conversion"></span>
        </p>
        <div id="spikeList"></div>
        <div class="insight" id="insight-spike"></div>
      </div>

      <div class="dark-card">
        <div class="card-title t" data-ko="PoE 종합 해석" data-en="PoE Summary"></div>
        <p id="poe-summary"></p>
      </div>

      <div id="poe-diagnosis-area" style="display:none;">
        <div class="card" style="border-left:3px solid #1D9E75;">
          <div class="card-title t" data-ko="PoE 에너지 진단" data-en="PoE Energy Diagnosis"></div>
          <div id="poe-type-badge" style="margin-bottom:18px;"></div>
          <div id="poe-signals"></div>
        </div>
        <div class="dark-card">
          <div class="card-title t" data-ko="PoE 종합 해석" data-en="PoE Reading"></div>
          <p id="poe-reading-text" style="font-size:13px;line-height:1.9;color:rgba(255,255,255,0.82);"></p>
        </div>
      </div>
    </div>

    <!-- 히트맵 탭 -->
    <div class="tab-content" id="tab-heatmap">
      <div class="card">
        <div class="card-title t" data-ko="요일별 에너지 전환율 히트맵" data-en="Energy Conversion Rate by Day of Week"></div>
        <p class="t" style="font-size:12px;color:#aaa;margin-bottom:20px;"
          data-ko="어느 요일에 올린 콘텐츠가 실제 에너지를 더 끌어모았는지 보여줍니다. 알고리즘 노출이 아닌 자발적 참여 기준입니다."
          data-en="Shows which days of the week attract more genuine energy. Based on voluntary engagement, not algorithm-driven impressions."></p>
        <div id="heatmap-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px;"></div>
        <div id="heatmap-bars" style="margin-bottom:8px;"></div>
        <div class="insight" id="heatmap-insight"></div>
      </div>
      <div class="card">
        <div class="card-title t" data-ko="요일별 평균 노출수" data-en="Average Impressions by Day of Week"></div>
        <p class="t" style="font-size:12px;color:#aaa;margin-bottom:16px;"
          data-ko="알고리즘이 요일별로 얼마나 다르게 작동하는지 보여줍니다. 전환율과 비교해보세요."
          data-en="Shows how the algorithm behaves differently by day. Compare with conversion rate above."></p>
        <div id="imp-bars"></div>
        <div class="insight amber" id="imp-insight"></div>
      </div>
      <div class="card" style="background:#1a1a2e;border-color:#1a1a2e;">
        <div class="card-title" style="color:rgba(255,255,255,0.4)">PoE</div>
        <p id="heatmap-poe" style="font-size:14px;color:rgba(255,255,255,0.82);line-height:1.8;"></p>
      </div>
    </div>

    <!-- 콘텐츠 분석 탭 -->
    <div class="tab-content" id="tab-content">
      <div id="content-not-loaded" class="card" style="text-align:center;padding:40px;">
        <p style="font-size:14px;color:#888;" class="t"
          data-ko="콘텐츠 분석 파일(account_analytics_content_*.csv)을 함께 업로드하면 이 탭이 활성화됩니다."
          data-en="Upload account_analytics_content_*.csv alongside your overview file to activate this tab."></p>
      </div>
      <div id="content-loaded" style="display:none;">
        <!-- 타입별 요약 카드 -->
        <div id="type-cards" style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;"></div>

        <!-- 타입별 효율 비교 바 -->
        <div class="card">
          <div class="card-title t" data-ko="콘텐츠 타입별 에너지 전환율" data-en="Energy Conversion Rate by Content Type"></div>
          <p class="t" style="font-size:12px;color:#aaa;margin-bottom:16px;"
            data-ko="각 타입의 노출 대비 실제 참여 비율. 어떤 형식이 진짜 에너지를 끌어모으는지 보여줍니다."
            data-en="Engagement-to-impression ratio per type. Shows which format genuinely attracts energy."></p>
          <div id="type-eff-bars"></div>
        </div>

        <!-- 타입별 팔로워 전환율 -->
        <div class="card">
          <div class="card-title t" data-ko="콘텐츠 타입별 팔로워 전환율" data-en="Follower Conversion Rate by Content Type"></div>
          <p class="t" style="font-size:12px;color:#aaa;margin-bottom:16px;"
            data-ko="노출 1만 당 새 팔로워 수. 어떤 타입이 지속적 노드 결집을 만드는지 보여줍니다."
            data-en="New followers per 10K impressions. Shows which type builds lasting node commitment."></p>
          <div id="type-fol-bars"></div>
        </div>

        <!-- TOP 5 포스트 -->
        <div class="card">
          <div class="card-title t" data-ko="에너지 집중 TOP 10 포스트" data-en="Top 10 Energy Concentration Posts"></div>
          <p class="t" style="font-size:12px;color:#aaa;margin-bottom:16px;"
            data-ko="전환율 기준 상위 포스트. 단 노출이 너무 적은 포스트는 제외됩니다."
            data-en="Top posts by conversion rate. Posts with very few impressions are excluded."></p>
          <div id="top-posts"></div>
        </div>

        <!-- PoE 인사이트 -->
        <div class="card" style="background:#1a1a2e;border-color:#1a1a2e;">
          <div class="card-title t" style="color:rgba(255,255,255,0.4)" data-ko="PoE 콘텐츠 인사이트" data-en="PoE Content Insight"></div>
          <p id="content-poe-insight" style="font-size:14px;color:rgba(255,255,255,0.82);line-height:1.8;"></p>
        </div>

        <!-- 날짜 통합 분석 -->
        <div id="integration-area" style="display:none;">
          <div class="card" style="border-left:3px solid #D85A30;">
            <div class="card-title t" data-ko="고에너지 날 포스트 매칭" data-en="High-Energy Day Post Match"></div>
            <p class="t" style="font-size:12px;color:#aaa;margin-bottom:20px;"
              data-ko="고에너지 급등일에 실제로 올린 포스트를 자동 매칭합니다. 어떤 콘텐츠가 에너지를 만들었는지 바로 확인하세요."
              data-en="Automatically matches posts published on your high-energy spike days. See exactly which content drove real energy."></p>
            <div id="integration-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 가이드 탭 -->
    <div class="tab-content" id="tab-guide">
      <div style="margin-bottom:28px;">
        <div class="gst t" data-ko="각 지표가 의미하는 것" data-en="What each metric means"></div>
        <div class="mrow">
          <div class="mn"><span class="t" data-ko="노출수" data-en="Impressions"></span><div class="tag" style="background:#e8f4ff;color:#185FA5"><span class="t" data-ko="에너지 도달" data-en="Energy reach"></span></div></div>
          <div class="mm t" data-ko="내 콘텐츠가 타임라인에 뜬 횟수. X 알고리즘이 배포한 양." data-en="How many times your content appeared in timelines. Distributed by X's algorithm."></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── 언어 시스템 ──────────────────────────────────────
let currentLang = 'ko';
let certData = {};
let contentData = null;

function T(ko, en) { return currentLang === 'ko' ? ko : en; }

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['ko','en'][i] === lang);
  });
  document.querySelectorAll('.t[data-' + lang + ']').forEach(el => {
    el.innerHTML = el.getAttribute('data-' + lang);
  });
  document.querySelector('html').lang = lang;
  if (certData.total) {
    renderAnalysisText(certData);
    renderPoeDiagnosis(certData);
    if (certData.data) renderHeatmap(certData.data);
  }
  if (contentData) renderContentTab();
}

// 초기 언어 적용
setLang('ko');

// ── CSV 파서 ──────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  return lines.map(line => {
    const fields = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    fields.push(cur.trim());
    return fields;
  });
}

function parseDate(raw) {
  if (!raw) return null;
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
    const [y, m, d] = raw.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return { label: `${MONTHS[m-1]} ${d}`, sortKey: y * 10000 + m * 100 + d, dow: dt.getDay() };
  }

  // "Month DD, YYYY" 또는 "Month DD YYYY"
  const xMatch = raw.match(/([A-Za-z]+)\s+(\d+),?\s*(\d{4})/);
  if (xMatch) {
    const mIdx = MONTHS.findIndex(mn => mn.toLowerCase() === xMatch[1].slice(0, 3).toLowerCase());
    if (mIdx !== -1) {
      const m = mIdx + 1, d = parseInt(xMatch[2]), y = parseInt(xMatch[3]);
      const dt = new Date(y, mIdx, d);
      return { label: `${MONTHS[mIdx]} ${d}`, sortKey: y * 10000 + m * 100 + d, dow: dt.getDay() };
    }
  }

  if (/^\d{10,}$/.test(raw)) return null;
  return null;
}

function findCol(headers, keywords) {
  const kw = keywords.map(k => k.toLowerCase());
  return headers.findIndex(h => kw.some(k => h.toLowerCase().includes(k)));
}

// ── 이벤트 ────────────────────────────────────────────
const zone = document.getElementById('uploadZone');
document.getElementById('fileInput').addEventListener('change', e => handleFiles(Array.from(e.target.files)));
document.getElementById('fileInput2').addEventListener('change', e => handleFiles(Array.from(e.target.files)));
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('active'); });
zone.addEventListener('dragleave', () => zone.classList.remove('active'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('active'); handleFiles(Array.from(e.dataTransfer.files)); });

function switchTab(n) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['analysis','heatmap','content','guide','update'][i] === n));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + n).classList.add('active');
}

function showError(msg) {
  document.getElementById('error-area').innerHTML = `<div class="error-box">${msg}</div>`;
}

function handleFiles(files) {
  if (!files || files.length === 0) return;
  const results = [];
  let loaded = 0;
  files.forEach((file, idx) => {
    const r = new FileReader();
    r.onload = e => {
      results[idx] = e.target.result;
      loaded++;
      if (loaded === files.length) {
        // 파일 타입 분류: 헤더에 '게시물 본문' 또는 'post' 가 있으면 content 파일
        const overviewTexts = [];
        const contentTexts = [];
        for (const text of results) {
          const firstLine = text.split('\n')[0].toLowerCase();
          if (firstLine.includes('게시물 본문') || firstLine.includes('post body') || firstLine.includes('tweet body') || firstLine.includes('게시물 id')) {
            contentTexts.push(text);
          } else {
            overviewTexts.push(text);
          }
        }
        parseMergedAndRender(overviewTexts.length > 0 ? overviewTexts : results);
        if (contentTexts.length > 0) {
          parseContentAndRender(contentTexts);
        }
      }
    };
    r.readAsText(file, 'UTF-8');
  });
}

// 하위 호환성 유지
function handleFile(file) { if (file) handleFiles([file]); }

function parseMergedAndRender(texts) {
  document.getElementById('error-area').innerHTML = '';

  // 모든 파일에서 데이터 수집 후 날짜 기준 병합 (중복 제거)
  const allData = {};
  let filesProcessed = 0;

  for (const text of texts) {
    const rows = parseCSV(text);
    if (rows.length < 2) continue;

    const headers = rows[0];
    const impIdx = findCol(headers, ['노출수','노출','impression','impressions','impression count']);
    const engIdx = findCol(headers, ['참여수','참여','engagement','engagements','engagement count']);
    const folIdx = findCol(headers, ['새로운 팔로우','새 팔로우','팔로우','new follow','new follower','followers gained','follows']);

    if (impIdx === -1 || engIdx === -1) continue;
    filesProcessed++;

    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i];
      if (!cols || cols.length < 2) continue;
      const dateInfo = parseDate(cols[0]);
      if (!dateInfo) continue;
      const imp = parseInt(cols[impIdx]) || 0;
      const eng = parseInt(cols[engIdx]) || 0;
      const fol = folIdx !== -1 ? (parseInt(cols[folIdx]) || 0) : 0;
      if (imp === 0 && eng === 0) continue;
      // 날짜 중복 시 가장 큰 값 유지 (같은 기간 파일 중복 방지)
      const key = dateInfo.sortKey;
      if (!allData[key] || imp > allData[key].imp) {
        allData[key] = { date: dateInfo.label, sortKey: dateInfo.sortKey, dow: dateInfo.dow, imp, eng, fol };
      }
    }
  }

  if (filesProcessed === 0) {
    showError(T(
      `노출수 또는 참여수 컬럼을 찾을 수 없어요. <strong>account_overview_analytics.csv</strong> 파일을 사용해주세요.`,
      `Could not find impressions or engagements columns. Please use the <strong>account_overview_analytics.csv</strong> file.`
    ));
    zone.style.display = 'none';
    document.getElementById('results').style.display = 'block';
    return;
  }

  // 날짜순 정렬
  const data = Object.values(allData).sort((a, b) => a.sortKey - b.sortKey);

  if (data.length === 0) {
    showError(T('유효한 날짜 데이터가 없어요.', 'No valid date data found.'));
    zone.style.display = 'none';
    document.getElementById('results').style.display = 'block';
    return;
  }

  const fileInfo = texts.length > 1
    ? T(`${texts.length}개 파일 병합 · 총 ${data.length}일`, `${texts.length} files merged · ${data.length} days total`)
    : T(`총 ${data.length}일`, `${data.length} days`);

  const dates = data.map(d => d.date);
  const imps = data.map(d => d.imp);
  const effs = data.map(d => d.imp > 0 ? parseFloat((d.eng / d.imp * 100).toFixed(2)) : 0);

  const total = imps.reduce((a, b) => a + b, 0);
  const avg = Math.round(total / imps.length);
  const totalEng = data.reduce((a, d) => a + d.eng, 0);
  const totalFol = data.reduce((a, d) => a + d.fol, 0);
  const avgEff = (totalEng / total * 100).toFixed(1);
  // 팔로워 전환율: 노출 1만 당 새 팔로우
  const folRate = total > 0 ? (totalFol / total * 10000).toFixed(1) : '0';
  const thr = avg * 3;
  const spikes = data.filter(d => d.imp >= thr).sort((a, b) => b.imp - a.imp);
  const maxImp = Math.max(...imps);
  const hiSpikes = spikes.filter(d => (d.eng / d.imp * 100) > parseFloat(avgEff));
  const loSpikes = spikes.filter(d => (d.eng / d.imp * 100) <= parseFloat(avgEff));
  const bestEff = [...data].filter(d => d.imp > 50).sort((a,b) => (b.eng/b.imp) - (a.eng/a.imp)).slice(0, 3);

  certData = { total, avgEff, folRate, totalFol, data, bestEff, hiSpikes, loSpikes, spikes, maxImp };
  renderAnalysisText(certData);

  // 파일 병합 안내 표시 (texts는 이 함수 내 로컬)
  if (texts.length > 1) {
    document.getElementById('error-area').innerHTML =
      `<div style="background:#e8f4ff;border:0.5px solid #378ADD;border-radius:10px;padding:12px 16px;font-size:13px;color:#185FA5;margin-bottom:16px;">
        ${T(`📂 ${fileInfo} — 날짜 중복은 자동으로 제거됩니다.`, `📂 ${fileInfo} — Duplicate dates are automatically removed.`)}
      </div>`;
  }

    ['mainChart','effChart'].forEach(id => { const c = Chart.getChart(id); if (c) c.destroy(); });

  new Chart(document.getElementById('mainChart'), {
    type: 'bar',
    data: { labels: dates, datasets: [{ data: imps, backgroundColor: imps.map(v => v >= thr ? '#1D9E75' : '#378ADD'), borderRadius: 2 }] },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => T('노출','Imp.')+': ' + ctx.raw.toLocaleString() } } },
      scales: { x: { ticks: { font:{size:10}, maxRotation:45, autoSkip:true, maxTicksLimit:20 }, grid: { color:'rgba(0,0,0,0.04)' } }, y: { ticks: { font:{size:11} }, grid: { color:'rgba(0,0,0,0.04)' } } }
    }
  });

  new Chart(document.getElementById('effChart'), {
    type: 'line',
    data: { labels: dates, datasets: [{ data: effs, borderColor:'#D85A30', backgroundColor:'rgba(216,90,48,0.07)', borderWidth:1.5, fill:true, tension:0.3, pointRadius: effs.map(v=>v>10?4:1.5), pointBackgroundColor: effs.map(v=>v>10?'#D85A30':'rgba(216,90,48,0.4)') }] },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw + '%' } } },
      scales: { x: { ticks: { font:{size:10}, maxRotation:45, autoSkip:true, maxTicksLimit:20 }, grid: { color:'rgba(0,0,0,0.04)' } }, y: { ticks: { font:{size:11}, callback: v => v + '%' }, grid: { color:'rgba(0,0,0,0.04)' } } }
    }
  });

  zone.style.display = 'none';
  document.getElementById('results').style.display = 'block';
  switchTab('analysis');
  renderHeatmap(data);
  renderPoeDiagnosis(certData);
  setLang(currentLang);
}

    `${spikes.length} high-energy spike days out of ${data.length} total (${(spikes.length/data.length*100).toFixed(0)}%). Of those, ${hiSpikes.length} also had above-average conversion.`

  document.getElementById('insight-spike').textContent = T(

    `${loSpikes.length} spike days had below-average conversion — possibly algorithm-boosted or controversy-driven.`

    `Energy conversion rate ${avgEff}% is ` + (parseFloat(avgEff) > 3 ? 'relatively healthy.' : 'worth improving.') +

// ── 요일별 히트맵 ─────────────────────────────────────
function renderHeatmap(data) {
  const dayNames = { ko: ['일','월','화','수','목','금','토'], en: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'] };
  const dayColors = ['#7F77DD','#378ADD','#1D9E75','#1D9E75','#1D9E75','#EF9F27','#D85A30'];

  // 날짜 파싱해서 요일 추출
  const byDay = Array.from({length:7}, () => ({ effSum:0, impSum:0, count:0 }));

  data.forEach(d => {
    if (d.dow === undefined || d.dow === null) return;
    byDay[d.dow].effSum += d.imp > 0 ? (d.eng / d.imp * 100) : 0;
    byDay[d.dow].impSum += d.imp;
    byDay[d.dow].count += 1;
  });

  const avgEffByDay = byDay.map(d => d.count > 0 ? parseFloat((d.effSum / d.count).toFixed(1)) : 0);
  const avgImpByDay = byDay.map(d => d.count > 0 ? Math.round(d.impSum / d.count) : 0);
  const maxEff = Math.max(...avgEffByDay);
  const maxImp = Math.max(...avgImpByDay);
  const bestEffDay = avgEffByDay.indexOf(maxEff);
  const bestImpDay = avgImpByDay.indexOf(maxImp);

  const ko = currentLang === 'ko';
  const names = dayNames[currentLang] || dayNames.ko;

  // 히트맵 카드 그리드
  const grid = document.getElementById('heatmap-grid');
  grid.innerHTML = '';
  avgEffByDay.forEach((eff, i) => {
    const intensity = maxEff > 0 ? eff / maxEff : 0;
    const bg = i === bestEffDay ? '#1D9E75' : `rgba(29,158,117,${0.1 + intensity * 0.7})`;
    const textColor = intensity > 0.5 || i === bestEffDay ? 'white' : '#1a1a2e';
    grid.innerHTML += `
      <div style="background:${bg};border-radius:10px;padding:14px 8px;text-align:center;">
        <div style="font-size:11px;color:${textColor};opacity:0.8;margin-bottom:4px;">${names[i]}</div>
        <div style="font-size:18px;font-weight:600;color:${textColor};">${eff.toFixed(1)}%</div>
        <div style="font-size:10px;color:${textColor};opacity:0.7;margin-top:2px;">${byDay[i].count}${ko?'일':'d'}</div>
      </div>`;
  });

  // 전환율 바 차트
  const barsEl = document.getElementById('heatmap-bars');
  barsEl.innerHTML = `<div style="font-size:11px;color:#aaa;margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">${ko?'요일별 평균 에너지 전환율':'Avg. Energy Conversion Rate by Day'}</div>`;
  avgEffByDay.forEach((eff, i) => {
    const pct = maxEff > 0 ? Math.round(eff / maxEff * 100) : 0;
    const isB = i === bestEffDay;
    barsEl.innerHTML += `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div style="font-size:12px;color:#888;min-width:24px;text-align:center;">${names[i]}</div>
        <div style="flex:1;background:#f0f0f0;border-radius:4px;height:24px;overflow:hidden;">
          <div style="width:${Math.max(pct,2)}%;height:24px;background:${isB?'#1D9E75':'rgba(29,158,117,0.4)'};border-radius:4px;display:flex;align-items:center;padding-left:8px;">
            <span style="font-size:11px;font-weight:${isB?600:400};color:${isB?'white':'#0F6E56'}">${eff.toFixed(1)}%</span>
          </div>
        </div>
        <div style="font-size:11px;color:#aaa;min-width:28px;">${byDay[i].count}${ko?'일':'d'}</div>
      </div>`;
  });

  // 노출수 바
  const impEl = document.getElementById('imp-bars');
  impEl.innerHTML = '';
  avgImpByDay.forEach((imp, i) => {
    const pct = maxImp > 0 ? Math.round(imp / maxImp * 100) : 0;
    const isB = i === bestImpDay;
    impEl.innerHTML += `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div style="font-size:12px;color:#888;min-width:24px;text-align:center;">${names[i]}</div>
        <div style="flex:1;background:#f0f0f0;border-radius:4px;height:24px;overflow:hidden;">
          <div style="width:${Math.max(pct,2)}%;height:24px;background:${isB?'#378ADD':'rgba(55,138,221,0.35)'};border-radius:4px;display:flex;align-items:center;padding-left:8px;">
            <span style="font-size:11px;font-weight:${isB?600:400};color:${isB?'white':'#185FA5'}">${imp.toLocaleString()}</span>
          </div>
        </div>
      </div>`;
  });

  // 인사이트 문구
  const sameDay = bestEffDay === bestImpDay;
  document.getElementById('heatmap-insight').textContent = T(
    sameDay
      ? `${names[bestEffDay]}요일이 노출과 전환율 모두 높습니다. 알고리즘과 실제 에너지가 같은 방향을 가리키고 있어요.`
      : `노출은 ${names[bestImpDay]}요일이 가장 높지만, 전환율은 ${names[bestEffDay]}요일이 더 높습니다. 이 차이가 알고리즘 노출과 진짜 에너지의 분리를 보여줍니다.`,
    sameDay
      ? `${names[bestEffDay]} has the highest impressions and conversion rate. Algorithm reach and genuine energy are aligned.`
      : `${names[bestImpDay]} has the highest impressions, but ${names[bestEffDay]} has the better conversion rate. This gap shows the separation between algorithm reach and genuine energy.`
  );

  document.getElementById('imp-insight').textContent = T(
    `노출이 높은 요일이 항상 좋은 것은 아닙니다. 전환율과 함께 볼 때 진짜 포스팅 최적 시점이 보입니다.`,
    `High impressions don't always mean better results. The real optimal posting time shows when you combine this with conversion rate.`
  );

  document.getElementById('heatmap-poe').textContent = T(
    `PoE 관점에서 최적 포스팅 요일은 노출이 많은 날이 아니라 사람들이 자발적으로 에너지를 투입하는 날입니다. 위 두 그래프의 차이가 클수록 알고리즘 의존도가 높다는 신호입니다.`,
    `From a PoE perspective, the optimal posting day is not the day with the most impressions, but the day people voluntarily invest energy. The larger the gap between the two charts above, the more algorithm-dependent your reach is.`
  );
}

// ── PoE 에너지 진단 ────────────────────────────────────
function renderPoeDiagnosis({ total, avgEff, folRate, data, bestEff, hiSpikes, loSpikes, spikes }) {
  const eff = parseFloat(avgEff);
  const fol = parseFloat(folRate);
  const algoDep = spikes.length > 0 ? Math.round(loSpikes.length / spikes.length * 100) : 0;

  // 에너지 유형 분류
  let typeName, typeDesc, typeColor;
  if (eff >= 4 && fol >= 5) {
    typeName = T('자발적 에너지 집중형', 'Voluntary Energy Concentrator');
    typeDesc = T('높은 전환율과 팔로워 결집력. PoE 관점에서 가장 건강한 패턴입니다.', 'High conversion and strong follower commitment — the healthiest pattern from a PoE perspective.');
    typeColor = '#1D9E75';
  } else if (eff >= 3) {
    typeName = T('에너지 공명형', 'Energy Resonator');
    typeDesc = T('전환율은 안정적이나 노드 결집력에 개선 여지가 있습니다.', 'Stable conversion rate, but node commitment has room to grow.');
    typeColor = '#378ADD';
  } else if (spikes.length > 0 && loSpikes.length / spikes.length > 0.6) {
    typeName = T('알고리즘 의존형', 'Algorithm-Dependent');
    typeDesc = T('노출은 크지만 실제 에너지 전환이 낮습니다. 알고리즘 부스트에 의존하는 경향이 있습니다.', 'High reach but low genuine conversion. Reach tends to depend on algorithm boosts.');
    typeColor = '#EF9F27';
  } else {
    typeName = T('에너지 축적 단계', 'Energy Accumulation Phase');
    typeDesc = T('아직 에너지가 집중되는 패턴이 선명하지 않습니다. 데이터가 쌓이면 패턴이 명확해집니다.', 'Energy concentration pattern is not yet clear. It will emerge as more data accumulates.');
    typeColor = '#888';
  }

  document.getElementById('poe-type-badge').innerHTML =
    `<div style="display:inline-flex;align-items:center;gap:10px;background:${typeColor}18;border:0.5px solid ${typeColor};border-radius:10px;padding:12px 16px;">
      <div style="width:8px;height:8px;border-radius:50%;background:${typeColor};flex-shrink:0;"></div>
      <div>
        <div style="font-size:14px;font-weight:600;color:${typeColor};">${typeName}</div>
        <div style="font-size:12px;color:#666;margin-top:3px;line-height:1.5;">${typeDesc}</div>
      </div>
    </div>`;

  // 3대 신호
  const SC = { good:'#1D9E75', mid:'#EF9F27', low:'#D85A30' };
  const SI = { good:'✓', mid:'△', low:'✕' };
  const signals = [
    {
      label: T('에너지 전환율', 'Energy Conversion'),
      value: eff + '%',
      s: eff >= 3 ? 'good' : eff >= 1.5 ? 'mid' : 'low',
      note: eff >= 3
        ? T('사람들이 자발적으로 에너지를 투입하고 있습니다', 'People are voluntarily investing energy')
        : eff >= 1.5
        ? T('에너지 전환이 일부 발생하나 개선 여지가 있습니다', 'Some energy conversion occurring, but room for improvement')
        : T('대부분의 노출이 에너지로 전환되지 않습니다', 'Most impressions are not converting to energy')
    },
    {
      label: T('노드 결집력', 'Node Commitment'),
      value: fol + T('명/1만', '/10K'),
      s: fol >= 5 ? 'good' : fol >= 2 ? 'mid' : 'low',
      note: fol >= 5
        ? T('강한 노드 자본 형성 신호입니다', 'Strong node capital formation signal')
        : fol >= 2
        ? T('중간 수준의 노드 결집이 일어나고 있습니다', 'Moderate node commitment forming')
        : T('지속적 관심으로 전환되는 비율이 낮습니다', 'Low rate of conversion to sustained attention')
    },
    {
      label: T('알고리즘 의존도', 'Algorithm Dependency'),
      value: algoDep + '%',
      s: algoDep <= 30 ? 'good' : algoDep <= 60 ? 'mid' : 'low',
      note: algoDep <= 30
        ? T('급등일 대부분이 실제 에너지를 동반합니다', 'Most spike days are backed by genuine energy')
        : algoDep <= 60
        ? T('일부 급등은 알고리즘 부스트일 가능성이 있습니다', 'Some spikes may be algorithm-driven')
        : T('급등일 상당수가 알고리즘 부스트이거나 논쟁성 콘텐츠일 수 있습니다', 'Many spike days may be algorithm-boosted or controversy-driven')
    }
  ];

  document.getElementById('poe-signals').innerHTML = signals.map(sg =>
    `<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:0.5px solid #f0f0f0;">
      <div style="width:20px;height:20px;border-radius:50%;background:${SC[sg.s]}18;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">
        <span style="font-size:11px;font-weight:600;color:${SC[sg.s]};">${SI[sg.s]}</span>
      </div>
      <div style="flex:1;">
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span style="font-size:12px;color:#888;">${sg.label}</span>
          <span style="font-size:14px;font-weight:600;color:${SC[sg.s]};">${sg.value}</span>
        </div>
        <div style="font-size:12px;color:#666;margin-top:2px;">${sg.note}</div>
      </div>
    </div>`
  ).join('');

  // 종합 해석 내러티브
  const topDay = bestEff.length > 0 ? bestEff[0] : null;
  const topDayEff = topDay ? (topDay.eng / topDay.imp * 100).toFixed(1) : null;
  let reading = '';
  if (currentLang === 'ko') {
    reading = `이 계정의 에너지는 "${typeName}" 패턴을 보입니다. `;
    reading += eff >= 3
      ? `전환율 ${eff}%는 노출된 사람 중 상당수가 자발적으로 행동을 취했다는 신호입니다. `
      : `전환율 ${eff}%는 대부분의 노출이 수동적으로 소비되고 있음을 나타냅니다. `;
    if (loSpikes.length > 0)
      reading += `급등일 ${spikes.length}일 중 ${loSpikes.length}일은 전환율이 평균을 밑돕니다. 이 날들의 콘텐츠가 실제로 에너지를 모았는지, 아니면 알고리즘이 배포한 것인지 직접 확인해볼 필요가 있습니다. `;
    if (topDay)
      reading += `가장 높은 에너지 집중이 일어난 날(${topDay.date}, ${topDayEff}%)의 콘텐츠가 이 계정의 핵심 자산입니다. `;
    reading += fol >= 3
      ? `팔로워 전환율 ${fol}명/1만 노출은 콘텐츠가 지속적 관심으로 이어지고 있다는 증거입니다.`
      : `팔로워 전환율 ${fol}명/1만 노출은 아직 지속적 노드 결집이 약하다는 신호입니다. 일회성 반응이 아닌 지속적 관심을 유도하는 방향을 탐색해볼 필요가 있습니다.`;
  } else {
    reading = `This account shows a "${typeName}" pattern. `;
    reading += eff >= 3
      ? `A ${eff}% conversion rate signals that a significant portion of those reached chose to act voluntarily. `
      : `A ${eff}% conversion rate suggests most impressions are being passively consumed. `;
    if (loSpikes.length > 0)
      reading += `Of ${spikes.length} spike days, ${loSpikes.length} had below-average conversion — worth checking whether those were genuine energy moments or algorithm distributions. `;
    if (topDay)
      reading += `Your highest energy concentration (${topDay.date}, ${topDayEff}%) represents the core content asset of this account. `;
    reading += fol >= 3
      ? `A follower conversion rate of ${fol} per 10K impressions shows content is translating into sustained commitment.`
      : `A follower conversion rate of ${fol} per 10K impressions suggests node commitment is still weak. Content that drives sustained attention — not just one-time reactions — is worth exploring.`;
  }

  document.getElementById('poe-reading-text').textContent = reading;
  document.getElementById('poe-diagnosis-area').style.display = '';
}

// ── 콘텐츠 분석 ─────────────────────────────────────
function parseContentAndRender(texts) {
  // 콘텐츠 타입 분류
  function classifyType(body, urlClicks) {
    body = (body || '').trim();
    if (body.startsWith('@')) return 'reply';
    if (urlClicks > 0) return 'link';
    if (/🧵|\d+\/\d+/.test(body)) return 'thread';
    if (body.length > 200) return 'long';
    return 'text';
  }

  const typeInfo = {
    text:   { ko:'텍스트', en:'Text',   color:'#378ADD' },
    reply:  { ko:'답글',   en:'Reply',  color:'#7F77DD' },
    link:   { ko:'링크',   en:'Link',   color:'#EF9F27' },
    thread: { ko:'스레드', en:'Thread', color:'#1D9E75' },
    long:   { ko:'장문',   en:'Long',   color:'#D85A30' },
  };

  const stats = {};
  Object.keys(typeInfo).forEach(t => stats[t] = { imp:0, eng:0, fol:0, bkm:0, count:0 });

  const posts = [];

  for (const text of texts) {
    const rows = parseCSV(text);
    if (rows.length < 2) continue;
    const headers = rows[0];

    // 컬럼 인덱스 찾기
    const bodyIdx  = findCol(headers, ['게시물 본문','post body','tweet body','본문']);
    const impIdx   = findCol(headers, ['노출수','노출','impression','impressions']);
    const engIdx   = findCol(headers, ['참여수','참여','engagement','engagements']);
    const folIdx   = findCol(headers, ['새로운 팔로우','새 팔로우','팔로우','new follow','follows']);
    const bkmIdx   = findCol(headers, ['북마크','bookmark','bookmarks']);
    const urlIdx   = findCol(headers, ['url 클릭수','url clicks','url click']);
    const dateIdx  = findCol(headers, ['날짜','date']);
    const linkIdx  = findCol(headers, ['게시물 링크','post link','tweet link']);

    if (bodyIdx === -1 || impIdx === -1) continue;

    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r || r.length < 3) continue;
      const body = r[bodyIdx] || '';
      const imp  = parseInt(r[impIdx])  || 0;
      const eng  = parseInt(r[engIdx])  || 0;
      const fol  = folIdx !== -1 ? (parseInt(r[folIdx]) || 0) : 0;
      const bkm  = bkmIdx !== -1 ? (parseInt(r[bkmIdx]) || 0) : 0;
      const url  = urlIdx !== -1 ? (parseInt(r[urlIdx]) || 0) : 0;
      const date = dateIdx !== -1 ? r[dateIdx] : '';
      const link = linkIdx !== -1 ? r[linkIdx] : '';
      if (imp === 0) continue;

      const type = classifyType(body, url);
      stats[type].imp   += imp;
      stats[type].eng   += eng;
      stats[type].fol   += fol;
      stats[type].bkm   += bkm;
      stats[type].count += 1;

      const dateInfo = parseDate(date);
      posts.push({ body: body.slice(0, 80), imp, eng, fol, bkm, url, date, link, type, sortKey: dateInfo ? dateInfo.sortKey : null });
    }
  }

  // 최소 포스트 수 체크
  const totalPosts = Object.values(stats).reduce((a,s)=>a+s.count,0);
  if (totalPosts === 0) return;

  contentData = { stats, posts };

  document.getElementById('tab-content-btn').style.display = '';
  document.getElementById('content-not-loaded').style.display = 'none';
  document.getElementById('content-loaded').style.display = 'block';

  renderContentTab();
}

function renderContentTab() {
  if (!contentData) return;
  const { stats, posts } = contentData;
  const ko = currentLang === 'ko';

  const typeInfo = {
    text:   { ko:'텍스트', en:'Text',   color:'#378ADD' },
    reply:  { ko:'답글',   en:'Reply',  color:'#7F77DD' },
    link:   { ko:'링크',   en:'Link',   color:'#EF9F27' },
    thread: { ko:'스레드', en:'Thread', color:'#1D9E75' },
    long:   { ko:'장문',   en:'Long',   color:'#D85A30' },
  };

  // 타입별 요약 카드
  const cardsEl = document.getElementById('type-cards');
  cardsEl.innerHTML = '';
  Object.entries(typeInfo).forEach(([type, info]) => {
    const s = stats[type];
    if (s.count === 0) return;
    const eff = (s.eng / s.imp * 100).toFixed(1);
    const label = ko ? info.ko : info.en;
    cardsEl.innerHTML += `
      <div style="background:white;border:0.5px solid #e5e7eb;border-radius:10px;padding:14px;border-top:3px solid ${info.color};">
        <div style="font-size:11px;color:#888;margin-bottom:4px;">${label}</div>
        <div style="font-size:22px;font-weight:600;color:#1a1a2e;">${eff}%</div>
        <div style="font-size:11px;color:#aaa;margin-top:2px;">${s.count}${ko?'개 포스트':' posts'}</div>
      </div>`;
  });

  // 전환율 바 차트
  const effEl = document.getElementById('type-eff-bars');
  effEl.innerHTML = '';
  const sortedByEff = Object.entries(stats)
    .filter(([,s])=>s.count>0)
    .map(([type,s])=>({ type, eff: s.imp>0 ? s.eng/s.imp*100 : 0 }))
    .sort((a,b)=>b.eff-a.eff);
  const maxEff = Math.max(...sortedByEff.map(x=>x.eff));

  sortedByEff.forEach(({type, eff}) => {
    const info = typeInfo[type];
    const pct = maxEff > 0 ? Math.round(eff/maxEff*100) : 0;
    const label = ko ? info.ko : info.en;
    effEl.innerHTML += `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div style="font-size:12px;color:#888;min-width:52px;">${label}</div>
        <div style="flex:1;background:#f0f0f0;border-radius:4px;height:28px;overflow:hidden;">
          <div style="width:${Math.max(pct,2)}%;height:28px;background:${info.color};border-radius:4px;display:flex;align-items:center;padding:0 10px;">
            <span style="font-size:12px;font-weight:600;color:white;">${eff.toFixed(1)}%</span>
          </div>
        </div>
        <div style="font-size:11px;color:#aaa;min-width:52px;">${stats[type].count}${ko?'개':''}</div>
      </div>`;
  });

  // 팔로워 전환율 바
  const folEl = document.getElementById('type-fol-bars');
  folEl.innerHTML = '';
  const sortedByFol = Object.entries(stats)
    .filter(([,s])=>s.count>0)
    .map(([type,s])=>({ type, fol: s.imp>0 ? s.fol/s.imp*10000 : 0 }))
    .sort((a,b)=>b.fol-a.fol);
  const maxFol = Math.max(...sortedByFol.map(x=>x.fol), 0.1);

  sortedByFol.forEach(({type, fol}) => {
    const info = typeInfo[type];
    const pct = Math.round(fol/maxFol*100);
    const label = ko ? info.ko : info.en;
    folEl.innerHTML += `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div style="font-size:12px;color:#888;min-width:52px;">${label}</div>
        <div style="flex:1;background:#f0f0f0;border-radius:4px;height:28px;overflow:hidden;">
          <div style="width:${Math.max(pct,2)}%;height:28px;background:${info.color};opacity:0.75;border-radius:4px;display:flex;align-items:center;padding:0 10px;">
            <span style="font-size:12px;font-weight:600;color:white;">${fol.toFixed(1)}</span>
          </div>
        </div>
        <div style="font-size:11px;color:#aaa;min-width:60px;">${ko?'명/1만':'per 10K'}</div>
      </div>`;
  });

  // TOP 10 포스트 (노출 20 이상)
  const topPosts = posts
    .filter(p => p.imp >= 20)
    .sort((a,b) => (b.eng/b.imp) - (a.eng/a.imp))
    .slice(0, 10);

  const topEl = document.getElementById('top-posts');
  topEl.innerHTML = '';
  topPosts.forEach(p => {
    const eff = (p.eng/p.imp*100).toFixed(1);
    const info = typeInfo[p.type];
    const label = ko ? info.ko : info.en;
    const folBadge = p.fol > 0 ? `<span style="font-size:10px;background:#f0fdf4;color:#0F6E56;padding:1px 6px;border-radius:4px;margin-left:6px;">+${p.fol}${ko?'명':''}</span>` : '';
    const bkmBadge = p.bkm > 0 ? `<span style="font-size:10px;background:#fdf4ff;color:#993556;padding:1px 6px;border-radius:4px;margin-left:4px;">🔖${p.bkm}</span>` : '';
    const linkBtn = p.link ? `<a href="${p.link}" target="_blank" rel="noopener" style="font-size:10px;color:#378ADD;text-decoration:none;padding:2px 8px;border:0.5px solid #378ADD;border-radius:4px;margin-left:auto;white-space:nowrap;flex-shrink:0;">${ko?'X에서 보기':'View on X'}</a>` : '';
    topEl.innerHTML += `
      <div style="padding:12px 0;border-bottom:0.5px solid #f0f0f0;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
          <span style="font-size:11px;font-weight:600;color:${info.color};background:${info.color}18;padding:2px 8px;border-radius:4px;">${label}</span>
          <span style="font-size:13px;font-weight:600;color:#1a1a2e;">${eff}%</span>
          <span style="font-size:11px;color:#aaa;">${ko?'노출':'imp'} ${p.imp}</span>
          ${folBadge}${bkmBadge}${linkBtn}
        </div>
        <div style="font-size:13px;color:#444;line-height:1.5;">${p.body}${p.body.length >= 80 ? '...' : ''}</div>
      </div>`;
  });

  // PoE 인사이트
  const bestType = sortedByEff[0];
  const worstType = sortedByEff[sortedByEff.length - 1];
  const bestInfo = typeInfo[bestType.type];
  const worstInfo = typeInfo[worstType.type];

  const insight = ko
    ? `${bestInfo.ko}형 콘텐츠가 전환율 ${bestType.eff.toFixed(1)}%로 가장 높은 에너지 집중을 보입니다. ` +
      `반면 ${worstInfo.ko}형은 ${worstType.eff.toFixed(1)}%로 상대적으로 낮습니다. ` +
      `PoE 관점에서 에너지가 자발적으로 모이는 콘텐츠 타입에 집중하는 것이 알고리즘 의존도를 줄이는 방향입니다.`
    : `${bestInfo.en} content leads with ${bestType.eff.toFixed(1)}% conversion — the highest energy concentration. ` +
      `${worstInfo.en} trails at ${worstType.eff.toFixed(1)}%. ` +
      `From a PoE perspective, focusing on formats that attract voluntary energy reduces algorithm dependency.`;

  document.getElementById('content-poe-insight').textContent = insight;
  renderIntegration();
}

// ── 날짜 통합 분석 ────────────────────────────────────
function renderIntegration() {
  const area = document.getElementById('integration-area');
  if (!area) return;
  if (!contentData || !certData.spikes || certData.spikes.length === 0) {
    area.style.display = 'none';
    return;
  }

  const { posts } = contentData;
  const ko = currentLang === 'ko';

  const typeInfo = {
    text:   { ko:'텍스트', en:'Text',   color:'#378ADD' },
    reply:  { ko:'답글',   en:'Reply',  color:'#7F77DD' },
    link:   { ko:'링크',   en:'Link',   color:'#EF9F27' },
    thread: { ko:'스레드', en:'Thread', color:'#1D9E75' },
    long:   { ko:'장문',   en:'Long',   color:'#D85A30' },
  };

  const avgEff = parseFloat(certData.avgEff);

  const matched = certData.spikes
    .map(spike => ({ spike, posts: posts.filter(p => p.sortKey === spike.sortKey) }))
    .filter(m => m.posts.length > 0)
    .slice(0, 5);

  if (matched.length === 0) {
    area.style.display = 'none';
    return;
  }

  area.style.display = '';

  const listEl = document.getElementById('integration-list');
  listEl.innerHTML = '';

  matched.forEach(({ spike, posts: dayPosts }) => {
    const spikeEff = (spike.eng / spike.imp * 100).toFixed(1);
    const isHigh = parseFloat(spikeEff) > avgEff;
    const dotColor = isHigh ? '#1D9E75' : '#378ADD';
    const tag = isHigh ? (ko?'고전환 급등':'High Conv. Spike') : (ko?'저전환 급등':'Low Conv. Spike');
    const tagBg = isHigh ? '#f0fdf4' : '#e8f4ff';
    const tagColor = isHigh ? '#0F6E56' : '#185FA5';

    const postsHtml = dayPosts.map(p => {
      const pEff = p.imp > 0 ? (p.eng / p.imp * 100).toFixed(1) : '0';
      const info = typeInfo[p.type] || typeInfo.text;
      const label = ko ? info.ko : info.en;
      const folBadge = p.fol > 0 ? `<span style="font-size:10px;background:#f0fdf4;color:#0F6E56;padding:1px 6px;border-radius:4px;">+${p.fol}${ko?'명':''}</span>` : '';
      const linkBtn = p.link ? `<a href="${p.link}" target="_blank" rel="noopener" style="font-size:10px;color:#378ADD;text-decoration:none;padding:2px 8px;border:0.5px solid #378ADD;border-radius:4px;margin-left:auto;flex-shrink:0;white-space:nowrap;">${ko?'X에서 보기':'View on X'}</a>` : '';
      return `
        <div style="padding:10px 12px;background:#f8f9fa;border-radius:8px;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
            <span style="font-size:11px;font-weight:600;color:${info.color};background:${info.color}18;padding:2px 7px;border-radius:4px;">${label}</span>
            <span style="font-size:12px;font-weight:600;color:#1a1a2e;">${pEff}%</span>
            <span style="font-size:11px;color:#aaa;">${ko?'노출':'imp'} ${p.imp.toLocaleString()}</span>
            ${folBadge}${linkBtn}
          </div>
          <div style="font-size:13px;color:#444;line-height:1.5;">${p.body}${p.body.length >= 80 ? '...' : ''}</div>
        </div>`;
    }).join('');

    listEl.innerHTML += `
      <div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;background:white;border:0.5px solid #e5e7eb;border-radius:10px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;"></div>
          <div style="font-size:13px;font-weight:600;color:#1a1a2e;">${spike.date}</div>
          <div style="font-size:12px;color:#888;">${spike.imp.toLocaleString()} ${ko?'노출':'imp'} · ${spikeEff}% ${ko?'전환':'conv.'}</div>
          <span style="font-size:10px;background:${tagBg};color:${tagColor};padding:2px 8px;border-radius:4px;font-weight:500;margin-left:auto;">${tag}</span>
        </div>
        ${postsHtml}
      </div>`;
  });
}
